name: CD - Build and Push to Amazon ECR

on:
  push:
    branches: ["main"]

env:
  ECR_REPOSITORY: simple-flask-ci
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v6

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui test
        run: pytest

      - name: Configura credenziali AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Crea repository ECR se non esiste
        run: |
          aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --region ${{ secrets.AWS_REGION }} \
          || aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --region ${{ secrets.AWS_REGION }}

      - name: Login su Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build immagine Docker
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -t $IMAGE_URI .

      - name: Push immagine su Amazon ECR
        run: |
          docker push $IMAGE_URI
